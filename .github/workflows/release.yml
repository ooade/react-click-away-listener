name: Release

on:
  push:
    branches:
      - main
      - beta
    paths:
      - 'src/**'
      - pnpm-lock.yaml
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Force a specific version bump (patch, minor, major). Leave empty to run semantic-release normally.'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push tags and create releases
      issues: write # Needed for semantic-release to comment on issues
      pull-requests: write # Needed for semantic-release to comment on PRs
      actions: write # Needed to trigger the publish workflow using gh CLI
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Manual Version Bump & Push Tag
        if: ${{ github.event.inputs.force_version != '' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ github.event.inputs.force_version }} -m "chore(release): bump version to %s"
          git push --follow-tags
          TAG=$(git describe --tags --abbrev=0)
          gh workflow run publish-npm.yml -f tag=$TAG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semantic Release
        if: ${{ github.event.inputs.force_version == '' }}
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
