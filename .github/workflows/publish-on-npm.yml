name: Publish on NPM

on:
  push:
    branches:
      - main
      - beta
    paths:
      - 'src/**'
      - pnpm-lock.yaml
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Force a specific version bump (patch, minor, major). Leave empty to run semantic-release normally.'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Needed for Trusted Publisher / OIDC
    steps:
      # Checkout repo
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup PNPM
      - uses: pnpm/action-setup@v3
        with:
          version: 10

      # Setup Node
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # Install dependencies
      - run: pnpm install

      # Build the package BEFORE publishing
      - name: Build package
        run: pnpm run build

      # Determine npm tag based on branch
      - name: Set NPM tag
        id: npm-tag
        run: |
          if [[ "${GITHUB_REF##*/}" == "beta" ]]; then
            echo "tag=next" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      # Manual version bump & publish
      - name: Manual Version Bump & Publish
        if: ${{ github.event.inputs.force_version != '' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ github.event.inputs.force_version }} --no-git-tag-version
          git add package.json
          git commit -m "chore(release): bump version to ${{ github.event.inputs.force_version }}"
          git push
          # Publish using Trusted Publisher / OIDC with correct tag
          npm publish --registry https://registry.npmjs.org/ --tag ${{ steps.npm-tag.outputs.tag }} --access public --provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # Automated semantic-release for regular releases
      - name: Run Semantic Release
        if: ${{ github.event.inputs.force_version == '' }}
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/